# Configuration for the Respiratory illness screening module.
# Supports Coswara (CC BY 4.0) and ICBHI 2017.

condition: respiratory

dataset:
  name: coswara                   # "coswara" | "icbhi"
  root: "data/Coswara-Data"       # path to cloned Coswara-Data repo
  tasks:                          # null = all tasks
    - cough-shallow
    - cough-heavy
    - breathing-shallow
    - breathing-deep

features:
  sample_rate: 16000
  n_mfcc: 13
  hop_length: 160
  frame_length: 400
  f0_min: 50.0
  f0_max: 500.0

training:
  seed: 42
  val_ratio: 0.15
  test_ratio: 0.15

classical:
  svm_C: 1.0
  svm_gamma: scale
  rf_n_estimators: 200

transformer:
  model_name: facebook/wav2vec2-base
  num_labels: 2
  learning_rate: 3.0e-5
  batch_size: 8
  num_epochs: 10
  warmup_steps: 50
  weight_decay: 0.01
  fp16: false

output:
  dir: results/respiratory
  save_model: true
  log_level: INFO
